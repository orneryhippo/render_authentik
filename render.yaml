version: 1

# PostgreSQL Database (separate top-level section)
databases:
  - name: authentik-db
    plan: free          # or starter / basic-256mb etc. for more resources
    databaseName: authentik
    user: authentik
    # Render auto-generates a strong password
    # Optional: postgresMajorVersion: '16' or '17'

# Key Value (Redis-compatible) instance
services:
  - type: keyvalue
    name: authentik-redis
    plan: free

  # Authentik Server (web service - public or internal as needed)
  - type: web
    name: authentik-server
    runtime: docker
    image: ghcr.io/goauthentik/server:latest
    plan: starter       # Minimum ~1 GB RAM recommended; free tier may be too tight
    region: oregon      # Change to your preferred region (e.g., frankfurt)
    envVars:
      - key: AUTHENTIK_SECRET_KEY
        generateValue: true
      - key: AUTHENTIK_POSTGRESQL__HOST
        fromDatabase:
          name: authentik-db
          property: host
      - key: AUTHENTIK_POSTGRESQL__NAME
        value: authentik
      - key: AUTHENTIK_POSTGRESQL__USER
        value: authentik
      - key: AUTHENTIK_POSTGRESQL__PASSWORD
        fromDatabase:
          name: authentik-db
          property: password
      - key: AUTHENTIK_REDIS__HOST
        fromService:
          name: authentik-redis
          property: host
      - key: AUTHENTIK_REDIS__PASSWORD
        fromService:
          name: authentik-redis
          property: password
      - key: AUTHENTIK_ERROR_REPORTING__ENABLED
        value: "false"
      - key: AUTHENTIK_BOOTSTRAP_PASSWORD   # Initial admin password (change immediately after first login)
        generateValue: true
    startCommand: server
    healthCheckPath: /-/health/

  # Authentik Worker (background tasks)
  - type: worker
    name: authentik-worker
    runtime: docker
    image: ghcr.io/goauthentik/server:latest
    plan: starter
    envVars:
      - key: AUTHENTIK_SECRET_KEY
        sync: true               # Share the generated value from the server
      - key: AUTHENTIK_POSTGRESQL__HOST
        fromDatabase:
          name: authentik-db
          property: host
      - key: AUTHENTIK_POSTGRESQL__NAME
        value: authentik
      - key: AUTHENTIK_POSTGRESQL__USER
        value: authentik
      - key: AUTHENTIK_POSTGRESQL__PASSWORD
        fromDatabase:
          name: authentik-db
          property: password
      - key: AUTHENTIK_REDIS__HOST
        fromService:
          name: authentik-redis
          property: host
      - key: AUTHENTIK_REDIS__PASSWORD
        fromService:
          name: authentik-redis
          property: password
      - key: AUTHENTIK_ERROR_REPORTING__ENABLED
        value: "false"
    startCommand: worker
